kind = "web"
previewPath = "/"
title = "Novel AI"
version = "1.0.0"
id = "artifacts/novel-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19117
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/novel-ai run dev"

[services.env]
PORT = "19117"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/novel-ai", "run", "build"]
publicDir = "artifacts/novel-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
